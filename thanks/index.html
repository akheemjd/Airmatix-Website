<!DOCTYPE html>
<html lang="en-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request received | Airmatix</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,300..800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- CONVERSION TAGS FIRE HERE.
     Via Cloudflare Zaraz (recommended) or inline: GA4 event 'generate_lead',
     Google Ads conversion snippet, Meta Pixel 'Lead'. This page only loads
     after a successful form submission, so tags here count real leads. -->
<style>
:root{--paper:#F6F5F1;--ink:#1A2129;--ink-soft:#4A5361;--line:#D4D0C4;--blue:#1D3FAE;--orange:#E8590C;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'Archivo',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100svh;display:grid;place-items:center;padding:24px;line-height:1.6}
.box{max-width:560px;border:1px solid var(--line);background:#fff;padding:clamp(32px,6vw,56px)}
.eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:18px;display:flex;align-items:center;gap:12px}
.eyebrow::before{content:"";width:30px;height:1px;background:var(--blue)}
h1{font-weight:700;font-stretch:115%;font-size:clamp(26px,4vw,36px);line-height:1.1;letter-spacing:-.015em}
p{color:var(--ink-soft);margin-top:16px}
a.btn{display:inline-block;margin-top:28px;background:var(--ink);color:#fff;text-decoration:none;font-weight:600;font-size:15px;padding:13px 24px;border-radius:2px}
a.btn:hover{background:#0E141C}
.mono-note{font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;color:var(--ink-soft);margin-top:30px;text-transform:uppercase}
</style>
</head>
<body>
<div class="box">
  <p class="eyebrow">Request received</p>
  <h1>Got it. We'll reply within one business day.</h1>
  <p>Your project details are in. If anything is time-sensitive, email <a href="mailto:info@airmatix.ca">info@airmatix.ca</a> and flag the deadline.</p>
  <a class="btn" href="/">Back to airmatix.ca</a>
  <p class="mono-note">© 2026 Airmatix · GTA · Southern Ontario</p>
</div>
</body>
</html>
